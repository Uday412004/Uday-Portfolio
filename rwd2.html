<title>My Responsive Profile </title>
<style>
div
{
border:1px black solid;
//padding:10px;
border-radius:5px;
}

#col1
{
width:20%;
height:100px;
margin:10px;
border-radius:100px;
}
#col2
{
width:60%;
height:200px;
margin:10px;
}


header
{
border:1px black solid;
//height:300px;
display:flex;
// flex-direction:column;
flex-direction:row;
//justify-content:end;
//justify-content:start;
//justify-content:center;end;
justify-content:space-between;
flex-wrap:wrap;
}

main
{
display:flex;
flex-wrap:wrap;
}

.cardstyle
{
width:60%;
height:180px;
box-shadow:10px 10px 10px black;
}

/* Extra small devices (phones, 600px and down) */

@media only screen and (max-width: 600px)
 {
body{background:tan;}
#col2{display:none;}
header{justify-content:center;}

.cardstyle{
margin:auto;
margin-top:20px;
}
}


/* Small devices (portrait tablets and large phones, 600px and up) */

@media only screen and (min-width: 600px)
{
body{background:lavender;}
#col1{width:10%;
height:40px;}
#col2{width:70%}
main{justify-content:center;
}
.cardstyle{width:40%;
margin:10px;
}
}


/* Medium devices (landscape tablets, 768px and up) */

@media only screen and (min-width: 768px)
{
body{background:pink;}
#col1{width:10%;
height:120px;}
#col2{height:200px;}
.cardstyle{
width:20%;
margin:10px;
}
}



/* Large devices (laptops/desktops, 992px and up) */

@media only screen and (min-width: 992px) 
{
body{background:cyan;}
#col2{width:90%;height:400px;margin:auto;margin-top:4px;margin-bottom:4px;}
#col1{display:none;}
}

.pic
{width:100%;
border-radius:5px;
}

</style>
<body>
