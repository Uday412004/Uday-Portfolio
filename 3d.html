<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
      @keyframes ani{
        from{transform:rotateY(0deg) rotateX(0deg) rotateZ(0deg);} 
        to { transform:rotateY(360deg) rotateX(340deg) rotateZ(230deg);}
      }
#container{
     width:1500px;
     height:500px;
     background-color:rgb(15, 16, 16);
     margin:auto;
     text-align:center;
     perspective:360px;
}

#p1
{
    width:200px;
    height:200px;
    background-color:rgb(15, 16, 16);
    position:relative;
    top:100px;
    left:100px;
    animation:ani 5s linear infinite alternate;
    margin:auto;

}

#p2
{
    width:200px;
    height:200px;
    background-color:rgb(15, 16, 16);
    position:relative;
    top:-100px;
    left:100px;
    //background-visibility:hidden;
    animation:ani 5s linear infinite alternate;
    margin:auto;

}



.pic
{
    width:100%;
    height:100%;
}


</style>


<body>
    
    <div id="container">


    <div id="p1">
<img src="images/space2.jpeg" class="pic">

    </div>



    <div id="p2">
<img src="images/space1.jpg" class="pic">        

     </div>

</div>
</body>
</html>
