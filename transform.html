<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
      @keyframes ani
      {

      //from{transform:rotateY(0deg) rotateX(0deg) rotateZ(0deg);}
      //from{transform:rotateY(360deg) rotateX(360deg) rotateZ(360deg);}

      from{transform:rotateY(0);}
      to{transform:rotateY(360deg);}

      }

#main
{
    background:black;
    width:1500px;
    height:900px;
    margin:auto;
    perspective:300px;

}

#card
{
    width:200px;
    height:200px;
    background:white;
    color:white;
    font-size:30px;
    text-align:center;
    box-sizing:border-box;
    text-transform:uppercase;
    //padding-top:10%;
    position:relative;
    left:600px;
    top:300px;
    //backface-visibility:hidden;
    animation:ani 5s infinite alternate;
}


.pic
{
   display:block;
   width:100px;
   height:200px;
   position:relative;
}

#p1
{
    display:block;
    top:0px;
    backface-visibility:visible;
}

#p2
{
    display:block;
    top:-200px;
    left:100px;
    backface-visibility:hidden;
}


</style>
<body>
      
      <div id="main">
      <div id="card">
      <img id="p1" class="pic" src="images/W1.png">
      <img id="p2" class="pic" src="images/W2.jpg">

      </div>
      
</body>
</html>
